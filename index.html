<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria de Imagenes</title>

  <!-- css -->
  <link rel="stylesheet" href="css/style.css">

  <!-- js -->
  <script src="js/principal.js" defer></script>
</head>
<body>

  <!-- encabezado -->
  <header>
    <h1>Galeria de Imagenes</h1>
    <p>haz click en una imagen</p>
  </header>

  <main>
    <!-- galeria -->
    <section id="galeria" class="galeria"></section>
  </main>

  <div id="visor" class="visor">

    <span id="boton-cerrar" class="boton-cerrar">&times;</span>

    <img id="imagen-grande" class="imagen-grande">

    <div id="contador" class="contador"></div>

    <button id="boton-anterior" class="boton-anterior">&#10094;</button>

    <button id="boton-siguiente" class="boton-siguiente">&#10095;</button>

  </div>

  <footer>
    <p>2026 - galeria</p>
  </footer>

</body>
</html>
